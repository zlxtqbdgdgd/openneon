name: USR naming guard

# feat-010 §3.2(d)：拦 4 组件 telemetry 出口侧的 USR 命名漂移（first-line CI guard）。
# 跟 feat-011 metric registry CI（second-line）互补。

on:
  pull_request:
    paths:
      - 'compute_tools/src/**'
      - 'proxy/src/binary/**'
      - 'pageserver/src/**'
      - 'safekeeper/src/**'
      - 'libs/utils/src/logging.rs'
      - 'libs/utils/src/usr.rs'
      - 'libs/tracing-utils/src/usr.rs'
      - 'scripts/usr_naming_guard.sh'
      - '.github/workflows/usr-naming-guard.yml'
  push:
    branches:
      - main

jobs:
  usr-naming-guard:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Run USR naming guard
        run: bash scripts/usr_naming_guard.sh
